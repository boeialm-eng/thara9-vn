<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>เกาะสุดขอบ · เอาตัวรอด</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Orbitron:wght@600;800&family=Noto+Sans+Thai:wght@400;600;700&family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  :root{--ink:#f0fff4;--glow:#40e8b0;--pla:#7dd87a;--guide:#e8c040;--warn:#ff5d70;}
  html,body{height:100%;}
  body{font-family:'Noto Sans Thai',sans-serif;background:#020a06;color:var(--ink);overflow:hidden;}
  #vn{position:relative;max-width:540px;height:100vh;margin:0 auto;overflow:hidden;}

  /* BACKGROUND */
  #bg{position:absolute;inset:0;transition:background .6s ease;overflow:hidden;}
  #bgArt{position:absolute;inset:0;}
  #eventArt{position:absolute;inset:0;z-index:1;opacity:0;transition:opacity 1.2s ease;pointer-events:none;}
  #eventArt.show{opacity:1;}
  #bg.alert::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%,transparent 40%,rgba(200,80,20,.20));
    animation:pulse 1.3s infinite;pointer-events:none;}
  @keyframes pulse{50%{opacity:.4}}
  .scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.10) 0 1px,transparent 1px 3px);z-index:6;}
  .vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 120px rgba(2,10,6,.9);z-index:5;}

  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;gap:10px;align-items:center;
    padding:8px 12px;font-family:'Share Tech Mono';font-size:10px;color:#a0e8c0;
    background:linear-gradient(180deg,rgba(2,12,6,.82),transparent);}
  .gauge{flex:1;} .gauge .lab{letter-spacing:1px;opacity:.7;}
  .gauge .bar{height:5px;background:#0a2a18;border-radius:3px;margin-top:2px;overflow:hidden;}
  .gauge .fill{height:100%;border-radius:3px;transition:width .5s;}
  #plaStat{white-space:nowrap;color:var(--pla);}
  #mute{border:1px solid #0a3020;background:transparent;color:#a0e8c0;border-radius:7px;padding:3px 8px;font-family:'Share Tech Mono';font-size:10px;cursor:pointer;}

  /* CHARACTER */
  #char{position:absolute;left:50%;bottom:165px;transform:translateX(-50%);z-index:4;
    width:230px;height:300px;display:flex;align-items:flex-end;justify-content:center;transition:opacity .3s;}
  #char svg{filter:drop-shadow(0 8px 22px rgba(0,0,0,.5));}
  #char img.sprite{height:100%;width:auto;object-fit:contain;border-radius:12px;
    box-shadow:0 0 0 1px rgba(64,232,176,.12),0 12px 32px rgba(0,0,0,.6);
    animation:floatIdle 4s ease-in-out infinite;}

  /* DIALOGUE */
  #dlgWrap{position:absolute;left:0;right:0;bottom:0;z-index:9;padding:10px;}
  #namebox{display:inline-block;font-family:'Mali';font-weight:700;font-size:14px;padding:4px 16px;border-radius:10px 10px 0 0;
    background:var(--glow);color:#020a06;margin-left:6px;}
  #namebox.pla{background:var(--pla);} #namebox.guide{background:var(--guide);}
  #namebox.narr{display:none;}
  #dlg{background:linear-gradient(180deg,rgba(4,18,10,.96),rgba(2,12,6,.97));
    border:1px solid #0a3820;border-radius:0 14px 14px 14px;padding:15px 16px 16px;min-height:96px;
    box-shadow:0 0 30px rgba(64,232,176,.10);font-size:15.5px;line-height:1.6;cursor:pointer;}
  #dlg.narr-style{font-style:italic;color:#b0e8d0;}
  #adv{position:absolute;right:18px;bottom:18px;color:var(--glow);font-size:13px;animation:bob 1s infinite;}
  @keyframes bob{50%{transform:translateY(3px)}}

  /* CHOICES */
  #choices{position:absolute;left:0;right:0;bottom:0;z-index:11;padding:12px;display:none;flex-direction:column;gap:8px;
    background:linear-gradient(0deg,rgba(2,12,6,.96) 70%,transparent);max-height:80%;overflow-y:auto;}
  #choices.show{display:flex;}
  .ask{font-family:'Mali';font-weight:600;font-size:14px;color:#c0f0d8;text-align:center;margin-bottom:2px;}
  .ch{border:1px solid #0a3820;background:rgba(4,18,10,.92);border-radius:11px;padding:12px 14px;color:var(--ink);
    font-family:'Noto Sans Thai';font-size:14px;line-height:1.4;text-align:left;cursor:pointer;transition:transform .07s,box-shadow .15s,background .15s;}
  .ch:hover{background:rgba(8,36,18,.96);box-shadow:0 0 16px rgba(64,232,176,.18);border-color:var(--glow);}
  .ch:active{transform:scale(.99);}

  /* OVERLAYS */
  .ov{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:20px;
    background:rgba(2,10,6,.84);backdrop-filter:blur(4px);}
  .ov.show{display:flex;animation:fade .3s;} @keyframes fade{from{opacity:0}}
  .box{background:linear-gradient(180deg,rgba(4,20,12,.97),rgba(2,12,6,.98));border:1px solid #0a3820;
    border-radius:18px;padding:22px;max-width:460px;width:100%;text-align:center;box-shadow:0 0 44px rgba(64,232,176,.14);}
  .box h1{font-family:'Mali';font-size:26px;color:var(--glow);margin-bottom:4px;text-shadow:0 0 20px rgba(64,232,176,.4);}
  .box h2{font-family:'Mali';font-size:17px;color:var(--glow);margin-bottom:8px;}
  .box p{font-size:14.5px;line-height:1.65;color:#d0f0e0;}
  .btn{font-family:'Mali';font-weight:700;border:1px solid var(--glow);background:rgba(64,232,176,.14);color:#f0fff4;
    border-radius:11px;padding:13px 18px;font-size:15px;cursor:pointer;width:100%;margin-top:9px;box-shadow:0 0 18px rgba(64,232,176,.16);}
  .btn:hover{background:rgba(64,232,176,.26);} .btn.alt{border-color:#0a3820;background:transparent;box-shadow:none;color:#a0e8c0;}

  /* RESULT — position:fixed หลุดจาก #vn overflow:hidden ทำให้เลื่อนได้ */
  #result{position:fixed;align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  #result .box{overflow:visible;max-height:none;text-align:left;margin:20px auto;padding-bottom:28px;}
  .code{font-family:'Orbitron';font-weight:800;font-size:44px;letter-spacing:8px;text-align:center;}
  .codeword{font-size:12px;color:#7fb8a0;text-align:center;}
  .grp{display:flex;gap:10px;padding:9px 0;border-top:1px solid #0a3820;}
  .gbar{width:5px;border-radius:5px;} .grp b{font-size:14px;} .grp .fac{font-size:11px;color:#7fb8a0;line-height:1.5;}
  .tag{font-size:9px;padding:2px 8px;border-radius:20px;white-space:nowrap;align-self:start;}
  .vnote{font-size:12px;background:rgba(64,232,176,.07);border:1px solid #0a3820;border-radius:10px;padding:10px;margin-top:10px;line-height:1.55;}
  .fnote{font-size:10.5px;color:#7fb8a0;line-height:1.6;margin-top:12px;}

  /* MOTION / ANIMATION */
  @keyframes kenBurns{from{transform:scale(1.03) translate(0,0)}to{transform:scale(1.08) translate(-10px,-6px)}}
  @keyframes kenBurns2{from{transform:scale(1.08) translate(9px,5px)}to{transform:scale(1.03) translate(0,0)}}
  @keyframes floatIdle{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
  #bgArt img{animation:kenBurns 28s ease-in-out infinite alternate;will-change:transform;}
  #eventArt img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    animation:kenBurns2 33s ease-in-out infinite alternate-reverse;will-change:transform;}
  #vn.motion-reduced #bgArt img,
  #vn.motion-reduced #eventArt img,
  #vn.motion-reduced #char img.sprite{animation:none!important;transform:none!important}
  @media(prefers-reduced-motion:reduce){
    #vn.shake,#fxOverlay.flicker,#bgArt.glitch,#dimOverlay.active{animation:none!important}
    #bg.alert::after{animation:none!important;opacity:.18!important}
    #bgArt img,#eventArt img,#char img.sprite{animation:none!important;transform:none!important}
  }

  /* EFFECTS */
  @keyframes shakeFx{0%,100%{transform:translate(0,0)}12%{transform:translate(-3px,2px)}25%{transform:translate(3px,-2px)}
    40%{transform:translate(-2px,3px)}55%{transform:translate(2px,-1px)}70%{transform:translate(-1px,2px)}85%{transform:translate(1px,-1px)}}
  #vn.shake{animation:shakeFx .5s ease forwards}
  @keyframes flickerFx{0%,100%{opacity:0}5%{opacity:.55}13%{opacity:0}38%{opacity:.45}45%{opacity:0}68%{opacity:.32}73%{opacity:0}}
  #fxOverlay{position:absolute;inset:0;z-index:28;pointer-events:none;background:#000;opacity:0}
  #fxOverlay.flicker{animation:flickerFx 1.2s ease forwards}
  #crackOverlay{position:absolute;inset:0;z-index:7;pointer-events:none;opacity:0;transition:opacity 2s;
    box-shadow:inset 0 0 80px rgba(180,80,20,.5),inset 0 0 40px rgba(180,60,10,.28)}
  #crackOverlay.active{opacity:1}
  #dimOverlay{position:absolute;inset:0;z-index:6;pointer-events:none;background:#000;opacity:0;transition:opacity 2s}
  #dimOverlay.active{opacity:.38}
  #bg.alert.calm-mode::after{animation:none!important;opacity:.10!important}
  #fxToggle{border:1px solid #0a3020;background:transparent;color:var(--glow);border-radius:7px;
    padding:3px 8px;font-family:'Share Tech Mono';font-size:10px;cursor:pointer;transition:color .2s,border-color .2s}
  #fxToggle.off{color:var(--warn);border-color:rgba(255,93,112,.4)}
</style>
</head>
<body>
<div id="vn">
  <div id="bg"><div id="bgArt"></div><div id="eventArt"></div></div>
  <div class="vig"></div><div class="scan"></div>
  <div id="fxOverlay"></div>
  <div id="crackOverlay"></div>
  <div id="dimOverlay"></div>

  <div id="hud">
    <div class="gauge"><div class="lab">SUPPLY</div><div class="bar"><div class="fill" id="g_sup" style="background:#e8c040"></div></div></div>
    <div class="gauge"><div class="lab">MORALE</div><div class="bar"><div class="fill" id="g_mor" style="background:#40e8b0"></div></div></div>
    <span id="plaStat">ปลา: โอเค</span>
    <button id="fxToggle" title="ลดเอฟเฟกต์">✦</button>
    <button id="mute">♪</button>
  </div>

  <div id="char"></div>

  <div id="dlgWrap">
    <div id="namebox">—</div>
    <div id="dlg">—<span id="adv">▼</span></div>
  </div>

  <div id="choices"></div>

  <!-- START -->
  <div class="ov show" id="start"><div class="box" style="background:linear-gradient(180deg,rgba(2,18,10,.97),rgba(2,12,6,.98));overflow:hidden;position:relative">
    <img src="assets/isl_key_title.png" onerror="this.style.display='none'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.22;pointer-events:none">
    <div style="position:relative;z-index:1">
    <h1>เกาะสุดขอบ</h1>
    <p style="color:#80e8c0;font-family:'Share Tech Mono';font-size:12px;margin-bottom:10px">SURVIVAL · VISUAL NOVEL</p>
    <p>เรือของกลุ่มเธอล่ม เธอขึ้นฝั่งเกาะร้างมาได้ มีเพื่อนชื่อ <b style="color:var(--pla)">ปลา</b> กับ <b style="color:var(--guide)">ไกด์พี่ป้อม</b> อยู่ด้วย<br><br>
    ต้องรอดชีวิตให้ได้ — <b>เลือกสิ่งที่เธออยากลงมือทำ</b> แล้วดูว่าสุดท้ายเธอคือคนแบบไหน</p>
    <button class="btn" id="startBtn">▶ เริ่มเรื่อง</button>
    <div class="fnote">12 สถานการณ์ · มีเสียงประกอบ · ภาพ AI</div>
  </div></div></div>

  <!-- CHECKPOINT -->
  <div class="ov" id="cp"><div class="box">
    <h2 id="cpHead">— จบบท —</h2>
    <p id="cpText"></p>
    <button class="btn" id="cpNext">เล่นต่อ ▶</button>
  </div></div>

  <!-- RESULT -->
  <div class="ov" id="result">
    <div class="box" id="card" style="position:relative;overflow:hidden">
      <img src="assets/isl_card_bg.png" onerror="this.style.display='none'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.10;pointer-events:none">
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

/* ============================================================
   แกนวัด — คัดลอกจาก thara9-vn.html ทุกตัวอักษร
   ============================================================ */
const TYPE={R:{c:'#ff7a4d',th:'ลงมือทำ'},I:{c:'#36c9c9',th:'วิเคราะห์'},A:{c:'#c46bd6',th:'สร้างสรรค์'},
  S:{c:'#ffc24d',th:'ดูแลคน'},E:{c:'#ff5d70',th:'นำ/สั่งการ'},C:{c:'#5d8bff',th:'จัดระบบ'}};
const DIMS=['R','I','A','S','E','C'],HEX={R:0,I:1,A:2,S:3,E:4,C:5};
const GROUP={
 R:{name:'สายสร้าง / ลงมือทำ',
    fac:'วิศวกรรม · เทคโนโลยี · เกษตร · สถาปัตย์(โครงสร้าง)',
    jobs:'วิศวกร · นักพัฒนาซอฟต์แวร์ · ช่างเทคนิค · สถาปนิก · ผู้ประกอบการ',
    desc:'เรียนรู้ผ่านการลงมือทำจริง ชอบเห็นผลลัพธ์ที่จับต้องได้ เมื่อเจอปัญหาสัญชาตญาณแรกคือ "แก้เลย"',
    strength:'แก้ปัญหาเฉพาะหน้าเก่ง ทำจริงทำได้',grow:'ลองวางแผนก่อนลงมือบ้าง'},
 I:{name:'สายวิเคราะห์ / ค้นคว้า',
    fac:'วิทยาศาสตร์ · แพทย์/แล็บ · เภสัช · วิทยาการข้อมูล',
    jobs:'นักวิทยาศาสตร์ · แพทย์ · นักวิจัย · Data Scientist · เภสัชกร',
    desc:'ชอบเข้าใจว่า "ทำไม" ก่อนลงมือ สนุกกับการหาคำตอบ ข้อมูลคือเพื่อนที่ดีที่สุด',
    strength:'คิดเป็นระบบ แก้ปัญหาด้วยข้อมูล',grow:'อย่าคิดจนไม่เริ่ม ลองลงมือก่อนบ้าง'},
 A:{name:'สายสร้างสรรค์',
    fac:'นิเทศ · ศิลปกรรม · สถาปัตย์(ออกแบบ) · ดิจิทัลมีเดีย',
    jobs:'กราฟิกดีไซเนอร์ · UX Designer · ผู้กำกับ · นักโฆษณา · Content Creator',
    desc:'มองหาวิธีใหม่ที่ไม่เหมือนใคร ชอบแสดงออกและสร้างสิ่งที่คนอื่นยังไม่คิดถึง',
    strength:'ไอเดียสด ทำให้สิ่งธรรมดากลายเป็นสิ่งพิเศษ',grow:'ทำไอเดียให้เป็นจริงทีละขั้น'},
 S:{name:'สายดูแล / เชื่อมคน',
    fac:'พยาบาล · ครุศาสตร์ · จิตวิทยา · สหเวช',
    jobs:'พยาบาล · ครู · นักจิตวิทยา · นักสังคมสงเคราะห์ · HR',
    desc:'ใส่ใจคนรอบข้าง สุขที่ได้ช่วยเหลือ มีความสามารถในการสร้างความสัมพันธ์ที่ดี',
    strength:'เข้าใจคน ทีมเวิร์กดี คนรอบข้างไว้วางใจ',grow:'ดูแลตัวเองด้วย ไม่ใช่แค่คนอื่น'},
 E:{name:'สายนำ / โน้มน้าว',
    fac:'บริหารธุรกิจ · นิติ · รัฐศาสตร์ · การตลาด',
    jobs:'ผู้จัดการ · ทนายความ · นักการตลาด · ผู้ประกอบการ · นักการเมือง',
    desc:'กล้าตัดสินใจและขับเคลื่อนให้สิ่งต่าง ๆ เกิดขึ้นจริง ชอบมีเป้าหมายชัดและทำให้ทีมเดินหน้า',
    strength:'ผู้นำที่กล้าเสี่ยง ทำให้ทีมเคลื่อนไหว',grow:'ฟังทีมก่อนตัดสินใจให้มากขึ้น'},
 C:{name:'สายจัดระบบ',
    fac:'บัญชี · การเงิน · ระบบสารสนเทศ · โลจิสติกส์',
    jobs:'นักบัญชี · นักการเงิน · นักวิเคราะห์ระบบ · Logistics Manager · ผู้ตรวจสอบ',
    desc:'ชอบความเป็นระเบียบและแม่นยำ ทำงานได้เชื่อถือได้ ไม่ชอบให้อะไรตกหล่น',
    strength:'รอบคอบ เชื่อถือได้ จัดการได้ครบ',grow:'ลองยืดหยุ่นกับการเปลี่ยนแปลงมากขึ้น'},
};

/* STATE */
let S={supplies:80,groupMorale:70,shelter:false,health:100,hope:70,plaHurt:false,foundRuins:false,signalSent:false};
const tally={R:0,I:0,A:0,S:0,E:0,C:0}, behaviorLog=[]; let valuesChoice=null, choiceT0=0;

/* ============================================================ SVG FALLBACK */
function plaPlaceholderSVG(expr){
  const E={
    neutral:{br:'M72 78 L90 78 M110 78 L128 78',eye:'norm',mo:'M88 108 Q100 113 112 108',ex:''},
    panic:  {br:'M70 70 L90 76 M110 76 L130 70',eye:'wide',mo:'M100 110 m-8 0 a8 8 0 1 0 16 0 a8 8 0 1 0 -16 0',ex:'<circle cx="126" cy="90" r="3" fill="#b0e8c8"/>'},
    relieved:{br:'M72 76 Q81 72 92 76 M108 76 Q119 72 128 76',eye:'happy',mo:'M86 106 Q100 118 114 106',ex:''},
    sad:    {br:'M72 74 Q81 80 90 80 M110 80 Q119 74 128 74',eye:'norm',mo:'M88 112 Q100 106 112 112',ex:''},
    brave:  {br:'M72 74 L90 80 M110 80 L128 74',eye:'norm',mo:'M88 108 L112 108',ex:''},
  }[expr]||{br:'M72 78 L90 78 M110 78 L128 78',eye:'norm',mo:'M88 108 Q100 113 112 108',ex:''};
  const eyes=E.eye==='wide'
    ?'<circle cx="82" cy="92" r="9" fill="#fff"/><circle cx="82" cy="92" r="5" fill="#2a4030"/><circle cx="118" cy="92" r="9" fill="#fff"/><circle cx="118" cy="92" r="5" fill="#2a4030"/>'
    :E.eye==='happy'
    ?'<path d="M74 94 Q82 86 90 94" stroke="#2a4030" stroke-width="3" fill="none"/><path d="M110 94 Q118 86 126 94" stroke="#2a4030" stroke-width="3" fill="none"/>'
    :'<circle cx="82" cy="93" r="5" fill="#2a4030"/><circle cx="118" cy="93" r="5" fill="#2a4030"/>';
  return `<svg width="200" height="270" viewBox="0 0 200 270">
    <path d="M40 270 Q40 200 100 190 Q160 200 160 270Z" fill="#3a7856"/>
    <path d="M78 190 L78 240 L122 240 L122 190" fill="#c8e8d0" stroke="#6a9870" stroke-width="1" opacity=".5"/>
    <rect x="88" y="178" width="24" height="24" rx="6" fill="#e8c8a0"/>
    <ellipse cx="100" cy="96" rx="56" ry="62" fill="#e8c8a0"/>
    <path d="M46 90 Q50 30 100 28 Q150 30 154 90 Q148 60 100 56 Q52 60 46 90Z" fill="#3a2818"/>
    <path d="M46 94 Q42 72 50 58Z" fill="#3a2818"/>
    <path d="M154 94 Q158 72 150 58Z" fill="#3a2818"/>
    ${eyes}
    <path d="${E.br}" stroke="#3a2818" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="${E.mo}" stroke="#a06060" stroke-width="3" fill="none" stroke-linecap="round"/>
    ${E.ex}
  </svg>`;
}
function guidePlaceholderSVG(expr){
  const mo=expr==='hopeful'?'M86 108 Q100 118 114 108':expr==='worried'?'M88 113 Q100 107 112 113':
    expr==='calm'?'M88 110 L112 110':'M88 109 Q100 115 112 109';

/* AUDIO — เสียงโทนเกาะ/ทะเล */
let actx,master,muted=false;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=.36;master.connect(actx.destination);
  // คลื่นทะเล: filtered noise + LFO ช้า ๆ เหมือนคลื่นซัด
  try{
    const buf=actx.createBuffer(1,actx.sampleRate*6,actx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=actx.createBufferSource();src.buffer=buf;src.loop=true;
    const f1=actx.createBiquadFilter();f1.type='bandpass';f1.frequency.value=300;f1.Q.value=.8;
    const f2=actx.createBiquadFilter();f2.type='lowpass';f2.frequency.value=800;
    const wg=actx.createGain();wg.gain.value=.022;
    // LFO: ทำให้คลื่นขึ้น-ลงช้า ๆ ~0.08Hz (รอบละ 12 วินาที)
    const lfo=actx.createOscillator();lfo.frequency.value=.08;
    const lg=actx.createGain();lg.gain.value=.012;
    lfo.connect(lg);lg.connect(wg.gain);lfo.start();
    src.connect(f1);f1.connect(f2);f2.connect(wg);wg.connect(master);src.start();
    // ลมเบา ๆ: oscillator ต่ำ ~50Hz นุ่ม
    const wind=actx.createOscillator();wind.type='sine';wind.frequency.value=52;
    const wnd=actx.createGain();wnd.gain.value=.010;
    wind.connect(wnd);wnd.connect(master);wind.start();
  }catch(e){}
}
function tone(f,d,t='sine',v=.12,delay=0){
  if(!actx||muted)return;
  const s=actx.currentTime+delay,o=actx.createOscillator(),g=actx.createGain();
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(.0001,s);g.gain.linearRampToValueAtTime(v,s+.014);
  g.gain.exponentialRampToValueAtTime(.0001,s+d);
  o.connect(g);g.connect(master);o.start(s);o.stop(s+d+.06);
}
// blip: หยดน้ำ/ใบไม้กระทบ — นุ่มไม่แหลม
const blip=()=>{
  if(!actx||muted)return;
  const s=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(460,s);o.frequency.exponentialRampToValueAtTime(130,s+.09);
  g.gain.setValueAtTime(.0001,s);g.gain.linearRampToValueAtTime(.065,s+.007);
  g.gain.exponentialRampToValueAtTime(.0001,s+.11);
  o.connect(g);g.connect(master);o.start(s);o.stop(s+.14);
};
// pick: เสียงเลือก — โทนกลมอุ่นเหมือนไม้กระทบ
const pick=()=>{tone(550,.06,'sine',.13);tone(1100,.03,'sine',.05,.01);};
// ding: chord major สดใส G major arpeggio + octave (ความหวัง/รอดชีวิต)
const ding=()=>[392,494,588,784].forEach((f,i)=>{tone(f,.65,'sine',.12,i*.1);tone(f*2,.26,'sine',.04,i*.1+.01);});
// stormWave: คลื่นพายุซัดแรง
const stormWave=()=>{if(!actx||muted)return;
  try{const buf=actx.createBuffer(1,actx.sampleRate*.4,actx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=actx.createBufferSource();src.buffer=buf;
    const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=600;
    const g=actx.createGain();g.gain.value=.18;
    src.connect(f);f.connect(g);g.connect(master);src.start();}catch(e){}
};
// birdChirp: นกร้องตอนเช้า
const birdChirp=()=>{[800,1000,1200,1000].forEach((f,i)=>tone(f,.07,'sine',.09,i*.07));};
// fireCrackle: เสียงไฟลุก
const fireCrackle=()=>{if(!actx||muted)return;
  try{const buf=actx.createBuffer(1,actx.sampleRate*.15,actx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;
    const src=actx.createBufferSource();src.buffer=buf;
    const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=2;
    const g=actx.createGain();g.gain.value=.12;
    src.connect(f);f.connect(g);g.connect(master);src.start();}catch(e){}
};

function fireShake(){if(_noFX()||Date.now()<_shCd)return;_shCd=Date.now()+600;
  const v=$("vn");v.classList.remove('shake');void v.offsetWidth;v.classList.add('shake');
  setTimeout(()=>v.classList.remove('shake'),550);}

  if(!b.bg)return;
  if(b.alert&&['beach','storm'].includes(b.bg)){setTimeout(fireShake,50);setTimeout(fireFlicker,130);}
  if(b.alert&&b.bg==='storm'){setTimeout(stormWave,80);setTimeout(stormWave,600);}
  if(b.bg==='camp'&&!b.alert){setTimeout(fireCrackle,100);}
  if(b.bg==='forest'||b.bg==='jungle'){setTimeout(birdChirp,200);}

function runCrisis(i){
  if(i>=CRISES.length){ending();return;}
  showEventImage(i);
  const prompt=i===7?'เสบียงร่อยหรอ เธอจะ?':'เธอจะทำอะไร?';
  play(CRISES[i].intro(S),()=>ask(prompt,CRISES[i].choices(),()=>afterChoice(i)));}

function afterChoice(i){
  if(i===7){runDilemma(()=>runCrisis(8));return;}
  if(i===5){showCheckpoint('— ครึ่งทางแรก —',
    `ผ่านมา 6 สถานการณ์แล้ว แนวที่โน้มไปตอนนี้: <b style="color:${TYPE[analyze().code[0]].c}">${TYPE[analyze().code[0]].th}</b> — ยังมีอีก 6 สถานการณ์`,
    ()=>runCrisis(6));return;}
  if(i===9){showCheckpoint('— จุดเปลี่ยน —',
    `เกือบถึงแล้ว แนวหลักตอนนี้: <b style="color:${TYPE[analyze().code[0]].c}">${TYPE[analyze().code[0]].th}</b> — เหลืออีก 2 สถานการณ์สุดท้าย`,
    ()=>runCrisis(10));return;}
  runCrisis(i+1);}

function showCheckpoint(head,html,next){
  $("cpHead").textContent=head;$("cpText").innerHTML=html;
  $("cp").classList.add('show');
  $("cpNext").onclick=()=>{$("cp").classList.remove('show');next();};}

/* SCORING — คัดลอกจาก thara9-vn.html ทุกตัวอักษร */
function analyze(){
  const ranked=DIMS.slice().sort((a,b)=>tally[b]-tally[a]),code=ranked.slice(0,3);
  const vals=DIMS.map(d=>tally[d]),diff=Math.max(...vals)-Math.min(...vals);
  const primary=code[0],nb=[DIMS[(HEX[primary]+1)%6],DIMS[(HEX[primary]+5)%6]];
  const secondary=code.slice(1).filter(d=>!nb.includes(d)),doors=nb.filter(d=>!code.includes(d));
  return {code,diff,primary,secondary,doors,flat:diff<=1};
}
function hexSVG(size){const c=size/2,R=size*.34,ang=i=>(-90+60*i)*Math.PI/180,v=(i,r)=>[c+r*Math.cos(ang(i)),c+r*Math.sin(ang(i))];
  const mx=Math.max(1,...DIMS.map(d=>tally[d])),pts=DIMS.map((d,i)=>v(i,R*Math.max(.12,tally[d]/mx)));
  let s=`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">`;
  [.34,.67,1].forEach(g=>s+=`<polygon points="${DIMS.map((_,i)=>v(i,R*g).join(",")).join(" ")}" fill="none" stroke="#ffffff14"/>`);
  s+=`<polygon points="${pts.map(p=>p.join(",")).join(" ")}" fill="#40e8b022" stroke="#40e8b0" stroke-width="2.5" stroke-linejoin="round"/>`;
  DIMS.forEach((d,i)=>{const[px,py]=pts[i],[lx,ly]=v(i,R+18);s+=`<circle cx="${px}" cy="${py}" r="5" fill="${TYPE[d].c}"/>
    <text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="13" font-weight="700" fill="${TYPE[d].c}">${d}</text>`;});
  return s+`</svg>`;}

function ending(){
  ding();
  const story=[];
  story.push(b('guide','hopeful','เรือมาแล้ว ทุกคนปลอดภัย การเดินทางนี้มันหนักมาก','beach',false));
  if(S.plaHurt)story.push(b('pla','relieved','ขาปลาดีขึ้นแล้ว แต่มันจะเป็นรอยที่จำว่าเราผ่านอะไรมาด้วยกัน'));
  else story.push(b('pla','relieved','หนูยืนอยู่ข้าง ๆ พี่จนจบเลย ขอบคุณนะ'));
  if(S.foundRuins)story.push(b('guide','hopeful','ซากที่พบ ช่วยให้เราส่งสัญญาณได้ถูกทิศทางเลย'));
  if(valuesChoice)story.push(b('guide','calm','การตัดสินใจครั้งสำคัญของเธอ: '+valuesChoice.note));
  story.push(b('guide','calm','อยากรู้ไหมว่าการเดินทางนี้บอกอะไรเกี่ยวกับตัวเธอบ้าง?'));
  play(story,showResult);}

// ── Parallax — ฉากเลื่อนเบา ๆ ตาม mouse / deviceorientation ─────────────────
;(()=>{
  let tx=0,ty=0,cx=0,cy=0;
  const MAX=3, L=.08;
  const lerp=(a,b,t)=>a+(b-a)*t;
  (function loop(){
    if(reducedMotion){tx=ty=cx=cy=0;}
    cx=lerp(cx,tx,L);cy=lerp(cy,ty,L);
    const g=$('bgArt');
    if(g)g.style.transform=reducedMotion?'':`translate(${cx.toFixed(2)}px,${cy.toFixed(2)}px)`;
    requestAnimationFrame(loop);
  })();
  window.addEventListener('mousemove',e=>{
    if(reducedMotion)return;
    tx=(e.clientX/window.innerWidth-.5)*MAX*2;
    ty=(e.clientY/window.innerHeight-.5)*MAX*2;
  },{passive:true});
  window.addEventListener('deviceorientation',e=>{
    if(reducedMotion)return;
    tx=Math.min(MAX,Math.max(-MAX,(e.gamma||0)/45*MAX));
    ty=Math.min(MAX,Math.max(-MAX,((e.beta||0)-45)/45*MAX));
  },{passive:true});
})();
</script>
